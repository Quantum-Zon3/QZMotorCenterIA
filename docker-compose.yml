services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    container_name: ai-agent-db
    environment:
      POSTGRES_DB: ai_agent_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_agent_db"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
